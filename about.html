<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เป้าหมาย - Income-Expense App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-4xl min-h-[700px] flex flex-col">
        
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-4xl min-h-[700px] flex flex-col">
        <nav class="flex justify-between md:justify-around p-2 mb-6 bg-gray-100 rounded-xl shadow-inner">
            <a href="index.html" id="nav-home" class="flex-1 text-center py-3 px-4 md:px-6 rounded-lg font-semibold text-sm md:text-base text-gray-700 transition-all duration-300 transform hover:bg-white hover:shadow-md">หน้าหลัก</a>
            <a href="invest.html" id="nav-invest" class="flex-1 text-center py-3 px-4 md:px-6 rounded-lg font-semibold text-sm md:text-base text-gray-700 transition-all duration-300 transform hover:bg-white hover:shadow-md">แนะนำการลงทุน</a>
            <a href="about.html" id="nav-about" class="flex-1 text-center py-3 px-4 md:px-6 rounded-lg font-semibold text-sm md:text-base text-gray-700 transition-all duration-300 transform hover:bg-white hover:shadow-md">เป้าหมาย</a>
        </nav>

        <div id="content-container" class="flex-1 flex flex-col">
            
            <div class="container mx-auto px-4 py-8">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-bold text-gray-800">เป้าหมายการออม</h1>
                    <button id="addGoalBtn" class="bg-blue-600 text-white py-2 px-5 rounded-lg hover:bg-blue-700 transition-colors flex items-center">
                        <i class="fas fa-plus mr-2"></i> เพิ่มเป้าหมาย
                    </button>
                </div>
        
                <div id="goalsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    </div>
            </div>
            </div>
    </div>
    <div id="addGoalModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md">
            <div class="flex justify-between items-center border-b p-4">
                <h3 class="text-xl font-semibold">เพิ่มเป้าหมายการออมใหม่</h3>
                <button id="closeAddGoalModalBtn" class="text-gray-500 hover:text-gray-800">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="addGoalForm" class="p-6 space-y-4">
                <div>
                    <label for="goalName" class="block text-sm font-medium text-gray-700">ชื่อเป้าหมาย</label>
                    <input type="text" id="goalName" placeholder="เช่น ซื้อรถ, เที่ยวญี่ปุ่น" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="targetAmount" class="block text-sm font-medium text-gray-700">จำนวนเงินเป้าหมาย (บาท)</label>
                    <input type="number" id="targetAmount" min="1" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="initialAmount" class="block text-sm font-medium text-gray-700">จำนวนเงินเริ่มต้น (บาท)</label>
                    <input type="number" id="initialAmount" min="0" value="0" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition-colors">
                    <i class="fas fa-save mr-2"></i> บันทึกเป้าหมาย
                </button>
            </form>
        </div>
    </div>

    <div id="addSavingModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md">
            <div class="flex justify-between items-center border-b p-4">
                <h3 class="text-xl font-semibold">บันทึกการออม</h3>
                <button id="closeAddSavingModalBtn" class="text-gray-500 hover:text-gray-800">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="addSavingForm" class="p-6 space-y-4">
                <h4 id="savingModalGoalName" class="text-lg font-medium text-center"></h4>
                <input type="hidden" id="savingGoalId">
                <div>
                    <label for="savingAmount" class="block text-sm font-medium text-gray-700">จำนวนเงินที่ออมเพิ่ม (บาท)</label>
                    <input type="number" id="savingAmount" min="1" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 transition-colors">
                    <i class="fas fa-plus mr-2"></i> เพิ่มเงินออม
                </button>
            </form>
        </div>
    </div>

    <div id="confirmationModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-sm">
            <div class="p-6 text-center">
                <i class="fas fa-exclamation-triangle text-5xl text-red-500 mb-4"></i>
                <h3 id="confirmationTitle" class="text-lg font-semibold mb-2">ยืนยันการลบ</h3>
                <p id="confirmationMessage" class="text-gray-600 mb-6">คุณแน่ใจหรือไม่ว่าต้องการลบ?</p>
                <div class="flex justify-center gap-4">
                    <button id="cancelBtn" class="py-2 px-6 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300">ยกเลิก</button>
                    <button id="confirmBtn" class="py-2 px-6 bg-red-600 text-white rounded-md hover:bg-red-700">ยืนยัน</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
