<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เป้าหมาย - Income-Expense App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4 max-w-4xl">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">เป้าหมายการออม</h1>
            <button id="openAddGoalModalBtn" class="bg-blue-600 text-white rounded-full p-2 w-12 h-12 flex items-center justify-center shadow-lg hover:bg-blue-700 transition duration-300">
                <i class="fas fa-plus text-2xl"></i>
            </button>
        </div>

        <div id="goalsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <p id="noGoalsText" class="text-gray-500">ยังไม่มีเป้าหมาย... เริ่มเพิ่มเป้าหมายแรกของคุณเลย!</p>
        </div>
    </div>

    <div id="addGoalModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md">
            <div class="flex justify-between items-center border-b p-4">
                <h3 class="text-xl font-semibold">สร้างเป้าหมายใหม่</h3>
                <button id="closeAddGoalModalBtn" class="text-gray-500 hover:text-gray-800">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="addGoalForm" class="p-6 space-y-4">
                <div>
                    <label for="goalName" class="block text-sm font-medium text-gray-700">เป้าหมายคือ</label>
                    <input type="text" id="goalName" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="goalTarget" class="block text-sm font-medium text-gray-700">จำนวนเงินที่ต้องเก็บ (บาท)</label>
                    <input type="number" id="goalTarget" min="1" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="goalInitial" class="block text-sm font-medium text-gray-700">ตอนนี้ออมได้เท่าไร (บาท)</label>
                    <input type="number" id="goalInitial" min="0" value="0" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-300">
                    <i class="fas fa-save mr-2"></i>บันทึกเป้าหมาย
                </button>
            </form>
        </div>
    </div>

    <div id="addSavingModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md">
            <div class="flex justify-between items-center border-b p-4">
                <h3 class="text-xl font-semibold">บันทึกการออม</h3>
                <button id="closeAddSavingModalBtn" class="text-gray-500 hover:text-gray-800">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="addSavingForm" class="p-6 space-y-4">
                <h4 id="savingModalGoalName" class="text-lg font-medium text-center"></h4>
                <input type="hidden" id="savingGoalId">
                <div>
                    <label for="savingAmount" class="block text-sm font-medium text-gray-700">จำนวนเงินที่ออมเพิ่ม (บาท)</label>
                    <input type="number" id="savingAmount" min="1" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 transition duration-300">
                    <i class="fas fa-piggy-bank mr-2"></i>ยืนยันการออม
                </button>
            </form>
        </div>
    </div>

    <nav class="flex justify-between md:justify-around p-2 mb-6 bg-gray-100 rounded-xl shadow-inner">
    <a href="index.html" id="nav-home" 
       class="flex-1 text-center py-3 px-4 md:px-6 rounded-lg font-semibold text-sm md:text-base text-gray-700 transition-all duration-300 transform hover:bg-white hover:shadow-md">
       หน้าหลัก
    </a>
    <a href="invest.html" id="nav-invest" 
       class="flex-1 text-center py-3 px-4 md:px-6 rounded-lg font-semibold text-sm md:text-base text-gray-700 transition-all duration-300 transform hover:bg-white hover:shadow-md">
       แนะนำการลงทุน
    </a>
    <a href="about.html" id="nav-about" 
       class="flex-1 text-center py-3 px-4 md:px-6 rounded-lg font-semibold text-sm md:text-base text-gray-700 transition-all duration-300 transform hover:bg-white hover:shadow-md">
       เป้าหมาย
    </a>
</nav>

    <script type="module" src="app.js"></script>
</body>
</html>
