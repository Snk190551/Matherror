<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าหลัก | แอปรายรับ-รายจ่าย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center">
                    <i class="fas fa-wallet text-2xl text-blue-600 mr-2"></i>
                    <a href="Index.html" class="text-xl font-bold text-gray-800">แอปรายรับ-รายจ่าย</a>
                </div>
                <div class="hidden md:flex items-center space-x-4">
                    <a href="Index.html" class="text-blue-600 font-semibold border-b-2 border-blue-600" aria-current="page">หน้าหลัก</a>
                    <a href="invest.html" class="text-gray-600 hover:text-blue-600">แนะนำการลงทุน</a>
                    <a href="about.html" class="text-gray-600 hover:text-blue-600">เป้าหมาย</a>
                </div>
                <div class="hidden md:flex items-center space-x-2" id="userInfo">
                    </div>
                <div class="md:hidden">
                    <button id="mobileMenuButton" class="text-gray-600 focus:outline-none">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobileMenu" class="md:hidden hidden px-4 pb-4 space-y-2">
            <a href="Index.html" class="block text-blue-600 font-semibold" aria-current="page">หน้าหลัก</a>
            <a href="invest.html" class="block text-gray-600 hover:text-blue-600">แนะนำการลงทุน</a>
            <a href="about.html" class="block text-gray-600 hover:text-blue-600">เป้าหมาย</a>
            <div id="userInfoMobile" class="space-y-2">
                </div>
        </div>
    </nav>

    <div id="message-modal" class="modal">
        <div class="bg-white p-6 rounded-xl shadow-lg max-w-sm w-full text-center">
            <h3 id="modal-title" class="text-xl font-semibold mb-4 text-gray-800"></h3>
            <p id="modal-message" class="text-gray-600 mb-6"></p>
            <button onclick="hideModal()" class="w-full bg-blue-500 text-white font-bold py-2 px-4 rounded-xl hover:bg-blue-600 transition-colors">ตกลง</button>
        </div>
    </div>
    <div id="confirmation-modal" class="modal">
        <div class="bg-white p-6 rounded-xl shadow-lg max-w-sm w-full text-center">
            <h3 id="confirmation-title" class="text-xl font-semibold mb-4 text-gray-800"></h3>
            <p id="confirmation-message" class="text-gray-600 mb-6"></p>
            <div class="flex space-x-4">
                <button id="confirm-cancel-btn" class="flex-1 w-full bg-gray-500 text-white font-bold py-2 px-4 rounded-xl hover:bg-gray-600 transition-colors">ยกเลิก</button>
                <button id="confirm-action-btn" class="flex-1 w-full bg-red-500 text-white font-bold py-2 px-4 rounded-xl hover:bg-red-600 transition-colors">ยืนยัน</button>
            </div>
        </div>
    </div>

    <div class="container mx-auto p-4">
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-4xl min-h-[700px] flex flex-col mx-auto">
            
            <div id="content-container" class="flex-1 flex flex-col md:flex-row md:space-x-6">
                
                <div class="w-full md:w-2/5 flex-shrink-0">
                    <div class="grid grid-cols-1 gap-4 mb-6">
                        <div class="bg-blue-50 p-4 rounded-xl shadow-md"><span class="block text-sm font-medium text-blue-800">ยอดคงเหลือ</span><span id="total-balance" class="text-2xl font-bold text-blue-900">0.00 บาท</span></div>
                        <div class="bg-green-50 p-4 rounded-xl shadow-md"><span class="block text-sm font-medium text-green-800">รายรับรวม</span><span id="total-income" class="text-xl font-semibold text-green-900">0.00 บาท</span></div>
                        <div class="bg-red-50 p-4 rounded-xl shadow-md"><span class="block text-sm font-medium text-red-800">รายจ่ายรวม</span><span id="total-expense" class="text-xl font-semibold text-red-900">0.00 บาท</span></div>
                    </div>
                    
                    <form id="transaction-form" class="bg-gray-50 p-5 rounded-xl shadow-inner">
                        <h2 class="text-xl font-bold text-gray-800 mb-4">เพิ่มรายการ</h2>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label for="date" class="block text-sm font-medium text-gray-700 mb-1">วันที่</label><input type="date" id="date" class="w-full px-4 py-2 border rounded-xl" required></div>
                            <div><label for="type" class="block text-sm font-medium text-gray-700 mb-1">ประเภท</label><select id="type" class="w-full px-4 py-2 border rounded-xl"><option value="income">รายรับ</option><option value="expense">รายจ่าย</option></select></div>
                        </div>
                        <div class="mt-4"><label for="category" class="block text-sm font-medium text-gray-700 mb-1">หมวดหมู่</label><input type="text" id="category" placeholder="เช่น เงินเดือน, ค่าอาหาร" class="w-full px-4 py-2 border rounded-xl" required></div>
                        <div class="mt-4"><label for="amount" class="block text-sm font-medium text-gray-700 mb-1">จำนวนเงิน (บาท)</label><input type="number" id="amount" placeholder="จำนวนเงิน" min="0" step="0.01" class="w-full px-4 py-2 border rounded-xl" required></div>
                        <button type="submit" class="w-full bg-blue-500 text-white font-bold py-3 px-4 rounded-xl hover:bg-blue-600 transition-colors mt-6">บันทึกรายการ</button>
                    </form>
                </div>

                <div class="flex-1 overflow-y-auto mt-8 md:mt-0">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-gray-800">ประวัติการทำรายการ</h2>
                        <div class="flex items-center space-x-2"><label for="inflation-rate" class="text-sm">เงินเฟ้อ</label><input type="number" id="inflation-rate" class_a="w-20 text-right" disabled><span class="text-sm">%</span></div>
                    </div>
                    <div id="inflation-status" class="text-xs text-gray-400 text-right mb-2"></div>
                    <div id="transactions-list" class="space-y-3 h-[450px] overflow-y-auto pr-2">
                        <p class="text-gray-500">กำลังโหลดรายการ...</p>
                    </div>
                </div>
            </div>
            </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
